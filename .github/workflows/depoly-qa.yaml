    # 1. Autenticar en GCP usando la clave de la cuenta de servicio
    - name: Autenticar en GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 2. Configurar las herramientas de Google Cloud SDK
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # 3. Configurar Docker para subir las imágenes sin problemas
    - name: Configurar Docker para Artifact Registry
      run: |-
        gcloud auth configure-docker ${{ env.GKE_ZONE }}-docker.pkg.dev

    # 4. Construir la imagen Docker de React con TypeScript
    - name: Construir Imagen Docker
      run: |-
        docker build \
          --tag "${{ env.GKE_ZONE }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}" \
          .

    # 5. Publicar la imagen Docker construida en Artifact Registry
    - name: Publicar Imagen Docker
      run: |-
        docker push "${{ env.GKE_ZONE }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"

    # 6. CRUCIAL: Obtener el contexto y las credenciales reales de GKE antes de usar kubectl
    - name: Obtener credenciales de GKE
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }} # Aquí mapea tu región de GCP (ej. us-central1)

    # 7. Aplicar los manifiestos en tu clúster de Google Cloud
    - name: Desplegar en GKE
      run: |-
        # Crear el espacio de nombres de QA si no existe todavía
        kubectl create namespace qa --dry-run=client -o yaml | kubectl apply -f -

        # Reemplazar de forma dinámica la URL de la imagen en tu manifiesto de Kubernetes
        sed -i "s|image:.*|image: ${{ env.GKE_ZONE }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}|g" k8s/deployment.yaml
        
        # Aplicar cambios de infraestructura
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
        
        # Monitorear el despliegue hasta que los nuevos pods de React estén 100% listos
        kubectl rollout status deployment/react-app-qa -n qa
